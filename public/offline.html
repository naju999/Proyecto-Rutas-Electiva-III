<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TuRuta - Sin conexion</title>
    <style>
      :root {
        --bg: #f2f5fa;
        --card: #ffffff;
        --ink: #112b4a;
        --muted: #62758f;
        --brand: #c4140e;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: 'Segoe UI', sans-serif;
        background:
          radial-gradient(circle at 20% 10%, rgba(196, 20, 14, 0.17) 0%, transparent 35%),
          radial-gradient(circle at 82% 18%, rgba(36, 90, 156, 0.14) 0%, transparent 33%),
          var(--bg);
        color: var(--ink);
        padding: 20px;
      }

      .card {
        width: min(560px, 100%);
        background: var(--card);
        border-radius: 18px;
        border: 1px solid #d7e0ee;
        box-shadow: 0 18px 30px rgba(16, 35, 63, 0.12);
        padding: 24px;
      }

      h1 {
        margin: 0 0 8px;
        font-size: clamp(1.3rem, 4vw, 2rem);
      }

      p {
        margin: 0;
        color: var(--muted);
        line-height: 1.5;
      }

      .hint {
        margin-top: 14px;
        padding: 12px;
        border-radius: 12px;
        border-left: 4px solid var(--brand);
        background: #fff5f4;
        color: #7a2b28;
        font-weight: 600;
      }

      button {
        margin-top: 18px;
        border: 0;
        border-radius: 10px;
        background: linear-gradient(125deg, #c4140e 0%, #8e0f0a 100%);
        color: #fff;
        font-weight: 700;
        padding: 10px 14px;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <main class="card" role="main">
      <h1>Sin conexion</h1>
      <p>No se pudo cargar esta vista porque no hay internet y el recurso no esta disponible en cache todavia.</p>
      <p class="hint">Puedes volver al mapa o reintentar cuando recuperes conexion.</p>
      <button type="button" onclick="location.reload()">Reintentar</button>
    </main>
  </body>
</html>
