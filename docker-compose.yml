services:
  postgres:
    image: postgis/postgis:16-3.4
    container_name: turuta-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: turuta_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/postgresql_schema.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
      - ./database:/opt/turuta/geojson:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d turuta_db"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
