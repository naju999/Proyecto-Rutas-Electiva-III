<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rutas de Buses de Tunja</title>

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="css/styles.css" />
</head>
<body data-active-view="inicio">
    <header id="header">
        <div class="brand-block">
            <p class="eyebrow">Movilidad urbana inteligente</p>
            <h1>Rutas de Buses de Tunja</h1>
        </div>
    </header>

    <main id="container">
        <section id="mapWorkspace" class="map-column">
            <div class="map-tools map-tools-home" id="homeMapOverlay">
                <div class="home-overlay-header">
                    <span class="home-overlay-title">Info rapida</span>
                    <button
                        type="button"
                        id="toggleHomeOverlayBtn"
                        class="overlay-toggle-btn"
                        aria-expanded="true"
                        aria-controls="homeMapOverlayContent"
                        aria-label="Minimizar panel de informacion"
                    >-</button>
                </div>

                <div class="home-map-info" id="homeMapOverlayContent">
                    <div class="home-tip-pane">
                        <div class="note-box home-map-note">
                            Tip: usa clic derecho sobre el mapa para capturar coordenadas y preparar una consulta.
                        </div>
                    </div>

                    <div class="home-coord-pane">
                        <p class="coord-title">Coordenadas actuales</p>
                        <div class="coordinates home-map-coords">
                            <div>
                                <span>Latitud</span>
                                <strong id="coordLat">5.527700</strong>
                            </div>
                            <div>
                                <span>Longitud</span>
                                <strong id="coordLng">-73.363900</strong>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div id="map"></div>
        </section>

        <aside id="sidebar"></aside>
    </main>

    <nav class="bottom-nav" aria-label="Navegacion principal">
        <button type="button" class="nav-item active" data-view="inicio" aria-current="page">
            <span class="nav-icon" aria-hidden="true">
                <svg viewBox="0 0 24 24" class="nav-icon-svg" focusable="false" aria-hidden="true">
                    <path d="M3 10.5L12 3l9 7.5"></path>
                    <path d="M5.5 9.5V20h13V9.5"></path>
                </svg>
            </span>
            <span class="nav-label">Inicio</span>
        </button>
        <button type="button" class="nav-item" data-view="rutas">
            <span class="nav-icon" aria-hidden="true">
                <svg viewBox="0 0 24 24" class="nav-icon-svg" focusable="false" aria-hidden="true">
                    <circle cx="5" cy="6" r="2"></circle>
                    <circle cx="19" cy="12" r="2"></circle>
                    <circle cx="5" cy="18" r="2"></circle>
                    <path d="M7 6h6a3 3 0 0 1 3 3"></path>
                    <path d="M17 13a3 3 0 0 1-3 3H7"></path>
                </svg>
            </span>
            <span class="nav-label">Rutas</span>
        </button>
        <button type="button" class="nav-item" data-view="favoritos">
            <span class="nav-icon" aria-hidden="true">
                <svg viewBox="0 0 24 24" class="nav-icon-svg" focusable="false" aria-hidden="true">
                    <path d="M12 20s-7-4.5-7-10a4 4 0 0 1 7-2.6A4 4 0 0 1 19 10c0 5.5-7 10-7 10z"></path>
                </svg>
            </span>
            <span class="nav-label">Favoritos</span>
        </button>
        <button type="button" class="nav-item" data-view="perfil">
            <span class="nav-icon" aria-hidden="true">
                <svg viewBox="0 0 24 24" class="nav-icon-svg" focusable="false" aria-hidden="true">
                    <circle cx="12" cy="8" r="4"></circle>
                    <path d="M5 20a7 7 0 0 1 14 0"></path>
                </svg>
            </span>
            <span class="nav-label">Perfil</span>
        </button>
    </nav>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script src="js/tileCache.js"></script>
    <script src="js/mapConfig.js"></script>
    <script src="js/mapLayers.js"></script>
    <script src="js/mapControls.js"></script>
    <script src="js/cacheManager.js"></script>
    <script src="js/diagnostics.js"></script>
    <script src="js/cache-debug-utils.js"></script>
    <script src="js/views-loader.js"></script>
</body>
</html>
